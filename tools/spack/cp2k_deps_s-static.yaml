# Spack environment file for a serial statically linked CP2K binary with all available dependencies

# Edit this file with care because it is automatically changed by the make_cp2k.sh script

spack:
  concretizer:
    unify: true

  config:
    install_tree:
      padded_length: 128
      root: /opt/spack

  modules:
    prefix_inspections:
      bin:
        - PATH
      lib:
        - LD_LIBRARY_PATH
      lib64:
        - LD_LIBRARY_PATH

  packages:
    all:
      buildable: true
      prefer:
        - "~cuda"
        - "~mpi"
        - "~mpi_f08"
        - "+openmp"
        - "+pic"
        - "~rocm"
    #   - "~shared" this does not work because of gettext
        - "+static"
        - "build_system=cmake"
        - "build_type=Release"

    # ScaLAPACK, LAPACK, BLAS
    blas:
      require:
        - openblas

    lapack:
      require:
        - openblas

    libxsmm:
      require:
        - "blas=default"

    openblas:
      require:
        - "+fortran"
        - "threads=openmp"

    # Libraries needed by CP2K
    dbcsr:
      require:
        - "~examples"
        - "+openmp"
        - "~shared"
        - "smm=libxsmm"

    fftw:
      require:
        - "+openmp"
        - "~shared"

    hdf5:
      require:
        - "+fortran"
        - "~shared"

    libint:
      require:
        - "+fortran"
        - "~shared"

    libxc:
      require:
        - "+kxc"
        - "~shared"

    spglib:
      require:
        - "~shared"

  repos:
    builtin:
      commit: 8564524a7a6c0c2dec8db6cb3b738874c17d2326 # 2026-04-01

  specs:
    # Build tools
    - "cmake@3.27:"
    - "gcc@10:"
    - "gmake@4.2:"
    - "ninja@1.13"
    - "python@3.11:"
    # CP2K
    - "dbcsr@2.9.1"
#   - "dftd4@4.0.2"
    - "fftw@3.3.10"
#   - "hdf5@2.1.0"
    - "libint@2.13.1-cp2k-lmax-5"
    - "libvori@220621"
    - "libxc@7.0.0"
    - "libxsmm@1.17-cp2k"
    - "openblas@0.3.32"
    - "pace@2025.12.4"
    - "spglib@2.7.0"
    - "tblite@0.5.0"

  view:
    default:
      root: /opt/spack/view
      exclude:
        # Exclude gcc-runtime to avoid adding a copy of libgomp.so to the view
        - gcc-runtime

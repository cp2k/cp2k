# Spack environment file for a serial CP2K binary with all available dependencies

# Edit this file with care because it is automatically changed by the make_cp2k.sh script

spack:
  concretizer:
    unify: true

  config:
    connect_timeout: 30
    install_tree:
      padded_length: 128
      root: /opt/spack

  modules:
    prefix_inspections:
      bin:
        - PATH
      lib:
        - LD_LIBRARY_PATH
      lib64:
        - LD_LIBRARY_PATH

  packages:
    all:
      buildable: true
      prefer:
        - "~cuda"
        - "+fortran"
        - "~mpi"
        - "~mpi_f08"
        - "~opencl"
        - "+openmp"
        - "+pic"
        - "~rocm"
        - "~tests"
        - "build_system=cmake"
        - "build_type=Release"

    cuda:
      buildable: false
      externals:
        - spec: cuda@12.9
          prefix: /usr/local/cuda

    # ScaLAPACK, LAPACK, BLAS
    blas:
      require:
        - openblas

    lapack:
      require:
        - openblas

    libxs:
      require:
        - "+fortran"

    libxsmm:
      require:
        - "+fortran"

    openblas:
      require:
        - "+fortran"
        - "threads=openmp"

    # Libraries needed by CP2K
    dbcsr:
      require:
        - "~examples"
        - "+openmp"
        - "smm=libxs"

    deepmdkit:
      require:
        - "+pytorch"

    fftw:
      require:
        - "+openmp"

    gauxc:
      require:
        - "+c"
        - "~cutlass"
        - "+fortran"
        - "+openmp"
        - "+skala skala_version=1.1"

    hdf5:
      require:
        - "+fortran"

    libint:
      require:
        - "+fortran"

    libxc:
      require:
        - "~cuda"
        - "+kxc"

    py-torch:
      require:
        - "~distributed"
        - "~fbgemm"
        - "~kineto"
        - "~mkldnn"
        - "~rocm"
        - "~valgrind"
        - "~xnnpack"

    trexio:
      require:
        - "+hdf5"

  repos:
    builtin:
      commit: 131214174051056d434e43d34f7c7645a385a835 # 2026-07-21

  specs:
    # Build tools
    - "cmake@3.27:"
    - "gcc@10:"
    - "gmake@4.2:"
    - "ninja@1.13"
    - "python@3.11:"
    # CP2K
    - "dbcsr@2.10.0"
    - "deepmdkit@3.1.3"
#   - "dftd4@4.0.2"
    - "fftw@3.3.11"
    - "gauxc@dev20260608"
    - "greenx@2.2"
    - "hdf5@2.1.0"
    - "libfci@0.1.0"
#   - "libgint@release_v1"
    - "libint@2.13.1-cp2k-lmax-5"
    - "libvori@220621"
    - "libxc@7.1.2"
    - "libxs@1.0.0"
    - "libxsmm@2.0.0"
#   - "libxstream@1.0.0"
    - "openblas@0.3.33"
    - "pace@2025.12.4.1"
    - "py-torch@2.12.1"
    - "spglib@2.7.0"
    - "tblite@0.6.0"
    - "trexio@2.5.0"

  view:
    default:
      root: /opt/spack/view
      exclude:
        - curl
        - gcc-runtime
        - readline

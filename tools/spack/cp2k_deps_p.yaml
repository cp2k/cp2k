# Spack environment file for an MPI parallel CP2K binary with all available dependencies

# Edit this file with care because it is automatically changed by the make_cp2k.sh script

spack:
  concretizer:
    unify: true

  config:
    connect_timeout: 30
    install_tree:
      padded_length: 128
      root: /opt/spack

  modules:
    prefix_inspections:
      bin:
        - PATH
      lib:
        - LD_LIBRARY_PATH
      lib64:
        - LD_LIBRARY_PATH

  packages:
    all:
      buildable: true
      prefer:
        - "~cuda"
        - "+mpi"
        - "+mpi_f08"
        - "+openmp"
        - "+pic"
        - "~rocm"
        - "build_system=cmake"
        - "build_type=Release"

    cuda:
      buildable: false
      externals:
        - spec: cuda@12.9
          prefix: /usr/local/cuda

    # Build tools
    mpi:
      require:
        - mpich

    mpich:
      require:
        - "~xpmem"
#       - "netmod=ofi"

    xpmem:
      require:
        - "xpmem@master ~kernel-module"

    # ScaLAPACK, LAPACK, BLAS
    blas:
      require:
        - openblas

    lapack:
      require:
        - openblas

    libxsmm:
      require:
        - "blas=default"

    openblas:
      require:
        - "+fortran"
        - "threads=openmp"
        - "build_system=makefile"

    scalapack:
      require:
        - netlib-scalapack

    # Libraries needed by CP2K
    adios2:
      require:
        - "~bzip2"

    cosma:
      require:
        - "~cuda ~gpu_direct"
        - "+scalapack"

    dbcsr:
      require:
        - "~examples"
        - "+openmp"
        - "smm=libxsmm"

    deepmdkit:
      require:
        - "+pytorch"

    dla-future:
      require:
        - "+scalapack"

    elpa:
      require:
        - "+openmp"

    fftw:
      require:
        - "+openmp"

    hdf5:
      require:
        - "+fortran"

    libfabric:
      require:
        - "~cuda ~gdrcopy"
#       - "fabrics=efa,ucx"

    libint:
      require:
        - "+fortran"

    libxc:
      require:
        - "~cuda"
        - "+kxc"

    mctc-lib:
      require:
        - "~openmp"

    openpmd-api:
      require:
        - "+adios2"

    pexsi:
      require:
        - "+fortran"

    py-torch:
      require:
        - "~cuda"
        - "~distributed"
        - "~kineto"
        - "~mkldnn"
        - "~rocm"
        - "~valgrind"

    sirius:
      require:
        - "~apps"
        - "+dftd3"
        - "+dlaf"
        - "+elpa"
        - "+fortran"
        - "+pugixml"
        - "+scalapack"
        - "+vdwxc"

    spla:
      require:
        - "+fortran"

    trexio:
      require:
        - "+hdf5"

  repos:
    builtin:
      commit: 7e4ffe332499db579e8b50ab627a9555f15a7c23 # 2026-04-28

  specs:
    # Build tools
    - "cmake@3.27:"
    - "gcc@10:"
    - "gmake@4.2:"
    - "mpich@5.0.1"
    - "ninja@1.13"
#   - "openmpi@5.0.10"
    - "python@3.11:"
    # CP2K
    - "adios2@2.12.0"
    - "cosma@2.8.4"
    - "dbcsr@2.9.1"
    - "deepmdkit@3.1.3"
#   - "dftd4@4.0.2"
    - "dla-future@0.10.0"
    - "dla-future-fortran@0.5.0"
    - "elpa@2026.02.001"
    - "fftw@3.3.11"
    - "greenx@2.2"
    - "hdf5@2.1.0"
    - "libfabric@2.5.1"
    - "libfci@0.1.0"
    - "libint@2.13.1-cp2k-lmax-5"
    - "libsmeagol@1.2"
    - "libvdwxc@0.5.0"
    - "libvori@220621"
    - "libxc@7.0.0"
    - "libxsmm@1.17-cp2k"
    - "mimic-mcl@3.0.0"
    - "netlib-scalapack@2.2.3"
    - "openblas@0.3.32"
    - "openpmd-api@0.17.0"
    - "pace@2025.12.4"
    - "pexsi@2.0.0"
    - "plumed@2.10.0"
    - "py-torch@2.11.0"
    - "sirius@7.11.1"
    - "spfft@1.1.1"
    - "spglib@2.7.0"
    - "spla@1.6.1"
    - "tblite@0.5.0"
    - "trexio@2.5.0"

  view:
    default:
      root: /opt/spack/view
      exclude:
        # Exclude gcc-runtime to avoid adding a copy of libgomp.so to the view
        - gcc-runtime
